<svg xmlns="http://www.w3.org/2000/svg" width="520" height="128" viewBox="0 0 520 128" role="img" aria-labelledby="title desc">
  <title id="title">Lumexa Labs LLC logo</title>
  <desc id="desc">Lumexa Labs LLC logo with a luminous L monogram and modern wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="20" x2="108" y1="14" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1f35"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="beam" x1="38" x2="92" y1="30" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset=".52" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" width="160%" height="160%" x="-30%" y="-30%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
