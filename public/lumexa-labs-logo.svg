  <rect width="96" height="96" x="16" y="16" fill="url(#bg)" rx="22"/>
  <path fill="#152a45" d="M32 42c0-5.5 4.5-10 10-10h44c5.5 0 10 4.5 10 10v44c0 5.5-4.5 10-10 10H42c-5.5 0-10-4.5-10-10V42z" opacity=".58"/>
