  <path fill="none" stroke="url(#beam)" stroke-linecap="round" stroke-linejoin="round" stroke-width="10" d="M50 43v42h31"/>
  <path fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M50 43v42h31" opacity=".58"/>
